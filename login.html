<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LootLocker Login</title>
    <link rel="icon" type="image/x-icon" href="styles/assets/favicon.ico" />
    <script>
      (function () {
        var match = document.cookie.match(
          /(?:^|;\s*)ll_theme=(light|dark)(?:;|$)/,
        );
        var saved = match ? match[1] : null;
        var isDark =
          saved === "dark" ||
          (!saved &&
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) {
          document.documentElement.classList.add("theme-dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="stylesheet" href="styles/custom.css" />
  </head>
  <body class="auth-page" data-auth-mode="login">
    <main id="authPageShell" class="shell">
      <section
        id="globalError"
        class="notice notice--error hidden"
        role="alert"
      ></section>

      <section id="authLayout" class="auth-layout">
        <header id="authHeader" class="auth-header">
          <div id="authIntroLogoWrap" class="auth-logo" aria-hidden="true">
            <img
              id="authLogo"
              src="styles/assets/logo-lightmode.svg"
              alt="LootLocker"
            />
          </div>
        </header>

        <section id="authCard" class="card auth-card">
          <form id="authForm" class="auth-form" method="post" novalidate>
            <div id="authFormCopy" class="auth-copy">
              <h2 id="authFormTitle">Sign in</h2>
              <p id="authFormDescription" class="muted">
                Use your LootLocker white label credentials.
              </p>
            </div>

            <label id="emailField" class="field">
              <span>Email</span>
              <input
                id="emailInput"
                name="email"
                type="email"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </label>

            <label id="passwordField" class="field">
              <span>Password</span>
              <div class="password-input-wrap">
                <input
                  id="passwordInput"
                  name="password"
                  type="password"
                  placeholder="Enter your password"
                  minlength="8"
                  autocomplete="current-password"
                  required
                />
                <button
                  id="passwordToggle"
                  class="password-toggle"
                  type="button"
                  data-password-toggle
                  data-target-input="passwordInput"
                  aria-label="Show password"
                  title="Show password"
                >
                  <span
                    class="password-toggle__icon password-toggle__icon--show ui-icon ui-icon--eye"
                    aria-hidden="true"
                  ></span>
                  <span
                    class="password-toggle__icon password-toggle__icon--hide ui-icon ui-icon--eye-off"
                    aria-hidden="true"
                  ></span>
                </button>
              </div>
            </label>

            <label id="rememberField" class="checkbox-field">
              <input
                id="rememberInput"
                name="remember"
                type="checkbox"
                checked
              />
              <span>Keep me signed in</span>
            </label>

            <p
              id="authError"
              class="notice notice--error hidden"
              role="alert"
            ></p>

            <button id="authSubmit" class="button" type="submit">
              Sign in
            </button>

            <p id="authSwitch" class="muted auth-switch">
              Need an account?
              <a id="authSwitchLink" href="signup.html">Create one</a>
            </p>
          </form>
        </section>
      </section>
    </main>

    <script>
      if (window.location.protocol === "file:") {
        const globalError = document.getElementById("globalError");
        globalError.textContent =
          "You are running this page from file://. Use a local web server (for example: python3 -m http.server 8080) so modules, cookies, and API calls work reliably.";
        globalError.classList.remove("hidden");
      }
    </script>
    <script src="scripts/custom.js"></script>
    <script type="module" src="scripts/pages/auth.js"></script>
  </body>
</html>
