<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LootLocker Profile</title>
    <link rel="icon" type="image/x-icon" href="styles/assets/favicon.ico" />
    <script>
      (function () {
        var match = document.cookie.match(
          /(?:^|;\s*)ll_theme=(light|dark)(?:;|$)/,
        );
        var saved = match ? match[1] : null;
        var isDark =
          saved === "dark" ||
          (!saved &&
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) {
          document.documentElement.classList.add("theme-dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="stylesheet" href="styles/custom.css" />
  </head>
  <body>
    <main class="shell">
      <p
        id="copyUidStatus"
        class="notice top-toast hidden"
        role="status"
        aria-live="polite"
      ></p>

      <header class="topbar">
        <div class="brand">
          <img
            id="brandLogo"
            src="styles/assets/logo-lightmode.svg"
            class="profile-logo"
            alt="LootLocker"
          />
        </div>
        <div class="topbar-actions">
          <button
            id="themeToggleButton"
            class="theme-toggle"
            aria-label="Enable dark mode"
            type="button"
          >
            <span class="ui-icon ui-icon--moon" aria-hidden="true"></span>
          </button>
          <button id="logoutButton" class="button button--ghost" type="button">
            Sign out
          </button>
        </div>
      </header>

      <section class="profile-summary" aria-label="Player summary">
        <div class="profile-head">
          <div id="avatar" class="avatar">--</div>
          <div class="profile-identity">
            <h2 id="playerName">Player</h2>
            <div class="profile-uid-row">
              <p id="playerUid" class="muted">UID</p>
              <button
                id="copyUidButton"
                class="copy-uid-button"
                aria-label="Copy Public UID"
                title="Copy Public UID"
                type="button"
              >
                <span class="ui-icon ui-icon--copy" aria-hidden="true"></span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <section id="pageLayout" class="page-layout">
        <div id="pageLayoutNav" class="page-layout__nav">
          <nav class="page-tabs" aria-label="Profile navigation">
            <a
              class="page-tab-link is-active"
              href="profile.html"
              aria-current="page"
              >Profile</a
            >
            <a class="page-tab-link" href="profile/friends.html">Friends</a>
            <a class="page-tab-link" href="profile/followers.html">Followers</a>
            <a class="page-tab-link" href="profile/following.html">Following</a>
            <a class="page-tab-link" href="profile/platforms.html"
              >Connected Accounts</a
            >
          </nav>
          <div class="page-tabs-divider" aria-hidden="true"></div>
        </div>

        <div id="pageLayoutMain" class="page-layout__main">
          <section
            id="globalError"
            class="notice notice--error hidden"
            role="alert"
          ></section>

          <section id="appView" class="content" aria-live="polite">
            <article class="card">
              <div class="section-title-row">
                <h3>Settings</h3>
              </div>

              <div class="settings-rows" aria-label="Account details">
                <div class="settings-row">
                  <span class="stat__label">Public UID</span>
                  <strong id="settingsPublicUid">-</strong>
                </div>
                <div class="settings-row">
                  <span class="stat__label">Joined</span>
                  <strong id="settingsJoinedAt">Unknown</strong>
                </div>
                <div class="settings-row">
                  <span class="stat__label">Last seen</span>
                  <strong id="settingsLastSeenAt">Unknown</strong>
                </div>
                <div class="settings-row">
                  <span class="stat__label">Email</span>
                  <strong id="settingsEmail">Unknown</strong>
                </div>
              </div>
            </article>

            <article class="card">
              <div class="section-title-row">
                <h3>Change Password</h3>
              </div>
              <p class="muted">
                For security, password updates are handled through a reset link
                sent to your account email.
              </p>
              <form id="passwordResetForm" class="settings-form">
                <div class="settings-form__actions">
                  <button id="passwordResetButton" class="button" type="submit">
                    Send reset email
                  </button>
                </div>
              </form>
              <p
                id="passwordResetStatus"
                class="notice hidden"
                role="status"
                aria-live="polite"
              ></p>
            </article>
          </section>
        </div>
      </section>
    </main>

    <script src="scripts/custom.js"></script>
    <script type="module" src="scripts/pages/profile.js"></script>
  </body>
</html>
