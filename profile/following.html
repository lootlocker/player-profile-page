<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Following | LootLocker Profile</title>
    <link rel="icon" type="image/x-icon" href="../styles/assets/favicon.ico" />
    <script>
      (function () {
        var match = document.cookie.match(
          /(?:^|;\s*)ll_theme=(light|dark)(?:;|$)/,
        );
        var saved = match ? match[1] : null;
        var isDark =
          saved === "dark" ||
          (!saved &&
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) {
          document.documentElement.classList.add("theme-dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="../styles/styles.css" />
    <link rel="stylesheet" href="../styles/custom.css" />
  </head>
  <body data-social-type="following" data-social-title="Following">
    <main class="shell">
      <p
        id="copyUidStatus"
        class="notice top-toast hidden"
        role="status"
        aria-live="polite"
      ></p>

      <header class="topbar">
        <div class="brand">
          <a href="../profile.html" aria-label="Back to profile">
            <img
              id="brandLogo"
              src="../styles/assets/logo-lightmode.svg"
              class="profile-logo"
              alt="LootLocker"
            />
          </a>
        </div>
        <div class="topbar-actions">
          <button
            id="themeToggleButton"
            class="theme-toggle"
            aria-label="Enable dark mode"
            type="button"
          >
            <span aria-hidden="true"
              ><img src="../styles/assets/icons/moon-dark.svg" alt=""
            /></span>
          </button>
          <button id="logoutButton" class="button button--ghost" type="button">
            Sign out
          </button>
        </div>
      </header>

      <section class="profile-summary" aria-label="Player summary">
        <div class="profile-head">
          <div id="avatar" class="avatar">--</div>
          <div class="profile-identity">
            <h2 id="playerName">Player</h2>
            <div class="profile-uid-row">
              <p id="playerUid" class="muted">UID</p>
              <button
                id="copyUidButton"
                class="copy-uid-button"
                aria-label="Copy Public UID"
                title="Copy Public UID"
                type="button"
              >
                <span aria-hidden="true"
                  ><img src="../styles/assets/icons/copy-light.svg" alt=""
                /></span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <section id="pageLayout" class="page-layout">
        <div id="pageLayoutNav" class="page-layout__nav">
          <nav class="page-tabs" aria-label="Profile navigation">
            <a class="page-tab-link" href="../profile.html">Profile</a>
            <a class="page-tab-link" href="friends.html">Friends</a>
            <a class="page-tab-link" href="followers.html">Followers</a>
            <a
              class="page-tab-link is-active"
              href="following.html"
              aria-current="page"
              >Following</a
            >
            <a class="page-tab-link" href="platforms.html"
              >Connected Accounts</a
            >
          </nav>
          <div class="page-tabs-divider" aria-hidden="true"></div>
        </div>

        <div id="pageLayoutMain" class="page-layout__main">
          <section
            id="globalError"
            class="notice notice--error hidden"
            role="alert"
          ></section>

          <section class="content" aria-live="polite">
            <article class="card">
              <div class="section-title-row">
                <h3 id="listTitle">Following</h3>
                <div class="social-head-actions">
                  <span class="social-total-pill" aria-label="Total following">
                    <span class="social-total-pill__label">Total</span>
                    <strong id="listCount">0</strong>
                  </span>
                </div>
              </div>
              <p
                id="listError"
                class="notice notice--error hidden"
                role="alert"
              ></p>
              <div class="platform-table-wrap">
                <div
                  id="followingTable"
                  class="platform-table social-table social-table--following"
                  aria-label="Following list"
                >
                  <div class="platform-table-header" role="row">
                    <div class="platform-cell platform-cell--header">
                      Player
                    </div>
                    <div
                      class="platform-cell platform-cell--header header-env-key"
                      data-env-key="PUBLIC_UID"
                    >
                      Public UID
                    </div>
                  </div>
                  <div id="socialList" class="platform-table-body">
                    <div class="platform-row">
                      <div class="platform-cell table-empty muted">
                        Loading following...
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </article>
          </section>
        </div>
      </section>
    </main>

    <script src="../scripts/custom.js"></script>
    <script type="module" src="../scripts/pages/social-list.js"></script>
  </body>
</html>
