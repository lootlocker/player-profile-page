<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Following | LootLocker Profile</title>
    <script>
      (function () {
        var match = document.cookie.match(
          /(?:^|;\s*)ll_theme=(light|dark)(?:;|$)/,
        );
        var saved = match ? match[1] : null;
        var isDark =
          saved === "dark" ||
          (!saved &&
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) {
          document.documentElement.classList.add("theme-dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body data-social-type="following" data-social-title="Following">
    <main class="shell">
      <p
        id="copyUidStatus"
        class="notice top-toast hidden"
        role="status"
        aria-live="polite"
      ></p>

      <header class="topbar">
        <div class="brand">
          <a href="../profile.html" aria-label="Back to profile">
            <img
              id="brandLogo"
              src="../styles/logo-lightmode.svg"
              class="profile-logo"
              alt="LootLocker"
            />
          </a>
        </div>
        <div class="topbar-actions">
          <button
            id="themeToggleButton"
            class="button button--ghost button--small theme-toggle"
            aria-label="Enable dark mode"
            type="button"
          >
            <span aria-hidden="true">🌙</span>
          </button>
          <button id="logoutButton" class="button button--ghost" type="button">
            Sign out
          </button>
        </div>
      </header>

      <section class="profile-summary" aria-label="Player summary">
        <div class="profile-head">
          <div id="avatar" class="avatar">--</div>
          <div class="profile-identity">
            <h2 id="playerName">Player</h2>
            <div class="profile-uid-row">
              <p id="playerUid" class="muted">UID</p>
              <button
                id="copyUidButton"
                class="button button--ghost button--small copy-uid-button"
                aria-label="Copy Public UID"
                title="Copy Public UID"
                type="button"
              >
                <span aria-hidden="true">📋</span>
              </button>
            </div>
          </div>
        </div>

        <div class="stats">
          <a class="stat stat-link" href="friends.html">
            <span class="stat__label">Friends</span>
            <strong id="friendsCount">0</strong>
          </a>
          <a class="stat stat-link" href="followers.html">
            <span class="stat__label">Followers</span>
            <strong id="followersCount">0</strong>
          </a>
          <a class="stat stat-link" href="following.html">
            <span class="stat__label">Following</span>
            <strong id="followingCount">0</strong>
          </a>
        </div>
      </section>

      <nav class="page-tabs" aria-label="Profile navigation">
        <a class="page-tab-link" href="../profile.html">Profile</a>
        <a class="page-tab-link" href="friends.html">Friends</a>
        <a class="page-tab-link" href="followers.html">Followers</a>
        <a
          class="page-tab-link is-active"
          href="following.html"
          aria-current="page"
          >Following</a
        >
        <a class="page-tab-link" href="platforms.html">Connected Accounts</a>
      </nav>
      <div class="page-tabs-divider" aria-hidden="true"></div>

      <section
        id="globalError"
        class="notice notice--error hidden"
        role="alert"
      ></section>

      <section class="content" aria-live="polite">
        <article class="card">
          <div class="section-title-row">
            <h3 id="listTitle">Following</h3>
            <div class="social-head-actions">
              <span class="social-total-pill" aria-label="Total following">
                <span class="social-total-pill__label">Total</span>
                <strong id="listCount">0</strong>
              </span>
            </div>
          </div>
          <p
            id="listError"
            class="notice notice--error hidden"
            role="alert"
          ></p>
          <div class="platform-table-wrap">
            <table class="platform-table" aria-label="Following list">
              <thead>
                <tr>
                  <th>Player</th>
                  <th>Public UID</th>
                </tr>
              </thead>
              <tbody id="socialList">
                <tr>
                  <td colspan="2" class="muted table-empty">
                    Loading following...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </article>
      </section>
    </main>

    <script type="module" src="../scripts/pages/social-list.js"></script>
  </body>
</html>
